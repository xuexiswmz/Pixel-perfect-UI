<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Visual Patch Fixture</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="fixture-shell">
    <header class="topbar" aria-label="顶部工具栏">
      <div class="brand">
        <div class="brand__mark" aria-hidden="true">MF</div>
        <div class="brand__text">
          <p class="brand__eyebrow">魔方创作平台</p>
          <h1 class="brand__title">视觉补丁回归页面</h1>
        </div>
      </div>
      <div class="toolbar-actions" aria-label="右上角工具区">
        <button class="toolbar-actions__icon" type="button" aria-label="切换模式">◐</button>
        <button class="toolbar-actions__icon" type="button" aria-label="通知消息">🔔</button>
        <button class="toolbar-actions__avatar" type="button" aria-label="用户头像">A</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" aria-label="左侧导航">
        <nav class="sidebar-nav">
          <a class="sidebar-nav__item is-active" href="#">
            <span class="sidebar-nav__icon" aria-hidden="true">⌂</span>
            <span>首页</span>
          </a>
          <a class="sidebar-nav__item" href="#">
            <span class="sidebar-nav__icon" aria-hidden="true">▣</span>
            <span>项目管理</span>
          </a>
          <a class="sidebar-nav__item" href="#">
            <span class="sidebar-nav__icon" aria-hidden="true">◌</span>
            <span>我的团队</span>
          </a>
          <a class="sidebar-nav__item" href="#">
            <span class="sidebar-nav__icon" aria-hidden="true">☰</span>
            <span>创作指引</span>
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <section class="hero-card" aria-label="Hero 欢迎区">
          <div class="hero-card__copy">
            <p class="hero-card__eyebrow">AI 漫画创作工作台</p>
            <h2>释放你的创作潜能</h2>
            <p class="hero-card__description">
              从角色设定到分镜排布，用统一的工作台串联你的灵感、素材和项目。
            </p>
            <div class="hero-card__actions" aria-label="Hero CTA 按钮组">
              <a class="hero-card__primary" href="#">开始创作</a>
              <a class="hero-card__secondary" href="#">了解更多</a>
            </div>
          </div>
          <div class="hero-card__visual" aria-hidden="true">
            <div class="hero-card__glow"></div>
            <div class="hero-card__sword"></div>
          </div>
        </section>

        <section class="projects-section" aria-label="最近项目区">
          <div class="section-heading">
            <h2>最近项目</h2>
            <p>用于测试空状态卡片、项目标题和按钮补丁定位。</p>
          </div>

          <article class="empty-state-card" aria-label="最近项目空状态卡片">
            <div class="empty-state-card__icon" aria-hidden="true">+</div>
            <h3>暂无项目</h3>
            <p>开始创建您的第一个项目</p>
            <div class="empty-state-card__actions" aria-label="空状态卡片底部操作区">
              <a class="empty-state-card__ghost" href="#">查看示例</a>
            </div>
          </article>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
